# Lucy Terminal Theme
include lucy-crimson.conf

# Typography
font_family family="Source Code Pro"
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13.5
text_composition_strategy 1.0 10
symbol_map U+E000-U+F8FF JetBrainsMono Nerd Font

# Window and CRT glass
window_padding_width 12
placement_strategy center
remember_window_size yes
background_opacity 0.92
background_blur 32
dynamic_background_opacity yes
background_image assets/crt-overlay.png
background_image_layout scaled
background_image_linear no
background_tint 0.18

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.6
cursor_trail 250
cursor_trail_decay 0.1 0.2

# Rounded top tab capsule
tab_bar_edge top
tab_bar_min_tabs 1
tab_bar_align center
tab_bar_margin_width 12
tab_bar_margin_height 8 4
tab_bar_style custom
tab_title_template "{index}  {title}"
active_tab_font_style bold
inactive_tab_font_style normal

# Tab shortcuts
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+right move_tab_forward
map ctrl+shift+left move_tab_backward
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Scrolling and feedback
scrollback_lines 10000
scrollbar scrolled
scrollbar_width 0.7
scrollbar_hover_width 1.2
scrollbar_radius 0.3
scrollbar_gap 0.1
url_style curly
visual_bell_duration 0.08
enable_audio_bell no
notify_on_cmd_finish unfocused
